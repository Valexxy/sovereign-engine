<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white p-6 font-sans">
    <h1 class="text-2xl font-black italic mb-8 uppercase tracking-tighter">Market Oracle</h1>

    <div class="bg-[#111] p-6 rounded-[32px] border border-white/5 mb-8">
        <div class="flex justify-between items-center mb-6">
            <span class="text-sm font-bold text-gray-400">USD / NGN</span>
            <span id="usd-val" class="text-xl font-black text-[#00ff88]">₦...</span>
        </div>
        <div class="flex justify-between items-center">
            <span class="text-sm font-bold text-gray-400">CNY / NGN</span>
            <span id="cny-val" class="text-xl font-black text-[#00ff88]">₦...</span>
        </div>
    </div>

    <div class="bg-gradient-to-br from-[#111] to-[#000] p-8 rounded-[32px] border border-white/5 text-center">
        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Aura Balance</p>
        <h2 id="aura-val" class="text-5xl font-black text-[#00ff88]">...</h2>
    </div>

    <script>
        const BRIDGE = "https://verlene-retrouss-eldora.ngrok-free.dev";
        // THIS HEADER BYPASSES THE NGROK WHITE SCREEN
        const headers = { "ngrok-skip-browser-warning": "true" };

        async function sync() {
            try {
                // Get User ID from URL
                const urlParams = new URLSearchParams(window.location.search);
                const uid = urlParams.get('user_id') || '859002701';

                const [mRes, uRes] = await Promise.all([
                    fetch(`${BRIDGE}/market`, { headers }),
                    fetch(`${BRIDGE}/user/${uid}`, { headers })
                ]);
                
                const m = await mRes.json();
                const u = await uRes.json();

                // Safety checks to prevent "undefined"
                document.getElementById('usd-val').innerText = `₦${(m.usd_ngn || 0).toLocaleString()}`;
                document.getElementById('cny-val').innerText = `₦${(m.cny_ngn || 0).toLocaleString()}`;
                document.getElementById('aura-val').innerText = (u.aura_balance || 0).toLocaleString();

            } catch (err) {
                console.error("Sync Failed", err);
            }
        }
        sync();
    </script>
</body>
</html>
